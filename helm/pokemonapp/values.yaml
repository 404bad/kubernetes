replicaCount: 1
image:
  repository: kailashbadu/pokemon-app
  pullPolicy: Always
  tag: v1.1.1

resources:
  requests:
    cpu: "30m"
    memory: "3Mi"
  limits:
    cpu: "100m"
    memory: "100Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2

targeCPUUtilizationPercentage: 80
targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 90
  periodSeconds: 60
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 90
  periodSeconds: 60
  failureThreshold: 3

service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: false

